name: Daily News Digest

on:
  schedule:
    # Runs at 7:00 AM Singapore time (SGT = UTC+8), so 23:00 UTC previous day
    - cron: '0 23 * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push the HTML file back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          GITHUB_PAGES_URL: ${{ secrets.GITHUB_PAGES_URL }}
        run: python digest.py

      - name: Publish to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "Daily digest $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push
